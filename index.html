<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia MГЎgica de MatemГЎticas вңЁ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <style>
        :root {
            --primary: #9b59b6;
            --secondary: #f1c40f;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg-dark: #2c3e50;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(circle at center, #3b2c5e 0%, #1a1025 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
            position: relative;
        }

        h1 {
            color: var(--secondary);
            font-size: 2.2rem;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            color: #fff;
            margin-top: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .avatar {
            font-size: 5rem;
            margin: -60px auto 10px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #question {
            font-size: 4rem;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            font-weight: 600;
        }

        input {
            width: 200px;
            padding: 15px;
            font-size: 2rem;
            border: 4px solid var(--primary);
            border-radius: 20px;
            text-align: center;
            outline: none;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-family: inherit;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 20px var(--secondary), inset 0 3px 5px rgba(0,0,0,0.2);
            transform: scale(1.05);
        }

        button {
            background: linear-gradient(to bottom, #f1c40f, #f39c12);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 6px 0 #d68910, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
            width: 100%;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #d68910, 0 5px 5px rgba(0,0,0,0.4);
        }
        
        button.secondary {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            box-shadow: 0 6px 0 #21618c, 0 15px 20px rgba(0,0,0,0.4);
        }
        button.secondary:active {
            box-shadow: 0 0 0 #21618c, 0 5px 5px rgba(0,0,0,0.4);
        }

        #feedback {
            margin-top: 25px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .magic-pop {
            position: absolute;
            pointer-events: none;
            animation: pop 1s ease-out forwards;
            font-size: 2rem;
            z-index: 20;
        }

        @keyframes pop {
            0% { transform: scale(0) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
        }
        
        .progress-bar-container {
            width: 100%;
            height: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--success), #a8e6cf);
            transition: width 0.3s ease;
        }

        #ranking-container {
            margin-top: 25px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 15px;
        }

        #ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        #ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.2rem;
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px;
            border-radius: 8px;
        }

        #ranking-list li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="stars" id="stars-container"></div>

<!-- PANTALLA DE INICIO -->
<div id="start-screen" class="glass-panel">
    <div class="avatar" id="start-avatar">рҹ§ҷвҖҚвҷӮпёҸ</div>
    <h1 id="game-title">Academia MГЎgica</h1>
    <p style="font-size: 1.2rem; margin-bottom: 25px;">ВЎBienvenido aprendiz! Ingresa tu nombre mГЎgico para empezar el desafГӯo.</p>
    
    <input type="text" id="player-name" placeholder="Tu nombre..." autofocus autocomplete="off" style="font-size: 1.5rem;">
    <button onclick="startGame()">ВЎComenzar!</button>
</div>

<!-- PANTALLA DE JUEGO -->
<div id="game-container" class="glass-panel" style="display: none;">
    <div id="quiz-section">
        <div class="avatar" id="wizard-avatar">рҹ§ҷвҖҚвҷӮпёҸ</div>
        <h1 id="game-title-active">Magia MatemГЎtica</h1>
        
        <div class="progress-bar-container">
            <div id="progress-bar"></div>
        </div>

        <div class="stats">
            <span>вңЁ Nivel: <b id="current-idx">1</b>/10</span>
            <span>вҸұпёҸ <b id="timer">0</b>s</span>
        </div>

        <div id="question">--</div>
        <input type="number" id="answer" placeholder="?">
        <button onclick="checkAnswer()">ВЎLanzar Hechizo!</button>
        <div id="feedback"></div>
    </div>
</div>

<!-- PANTALLA DE RESULTADOS Y RANKING -->
<div id="score-board" class="glass-panel" style="display: none;">
    <div class="avatar">рҹҺ“</div>
    <h1>ВЎMisiГіn Cumplida!</h1>
    <p id="final-msg" style="font-size: 1.8rem; color: var(--secondary); margin: 15px 0;"></p>
    <p id="time-result" style="font-size: 1.3rem; margin-bottom: 15px;"></p>
    
    <div id="ranking-container">
        <h2>рҹҸҶ Ranking del DГӯa</h2>
        <ul id="ranking-list">
            <!-- Ranking items will be injected here -->
        </ul>
    </div>

    <button onclick="location.reload()" style="margin-top: 25px;">Jugar de nuevo рҹ”„</button>
</div>

<script>
    // Generar fondo de estrellas
    const starsContainer = document.getElementById('stars-container');
    for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = Math.random() * 4 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = Math.random() * 3 + 1 + 's';
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
    }

    let playerName = "";
    let currentAns, score = 0, count = 1, seconds = 0, timerInterval;
    const totalQuestions = 10;
    let synth = window.speechSynthesis;

    function playSound(text, pitch = 1.2, rate = 1.1) {
        if (!synth) return;
        synth.cancel();
        let utter = new SpeechSynthesisUtterance(text);
        utter.pitch = pitch;
        utter.rate = rate;
        utter.lang = 'es-ES';
        synth.speak(utter);
    }

    function createMagicPop(x, y, emoji) {
        const pop = document.createElement('div');
        pop.className = 'magic-pop';
        pop.innerText = emoji;
        pop.style.left = x + 'px';
        pop.style.top = y + 'px';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 1000);
    }

    // --- LГіgica de Inicio ---
    function startGame() {
        const nameInput = document.getElementById('player-name').value.trim();
        if (!nameInput) {
            playSound("Por favor, dime tu nombre mГЎgico", 1.2);
            document.getElementById('start-screen').classList.add('shake');
            setTimeout(() => document.getElementById('start-screen').classList.remove('shake'), 500);
            return;
        }
        
        playerName = nameInput;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        
        playSound(`ВЎPrepara tu varita, ${playerName}!`, 1.2);
        
        // Empezar juego
        score = 0; count = 1; seconds = 0;
        startTimer();
        generateQuestion();
    }

    document.getElementById('player-name').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') startGame(); 
    });

    // --- LГіgica del Juego ---
    function startTimer() {
        timerInterval = setInterval(() => { 
            seconds++; 
            document.getElementById('timer').innerText = seconds; 
        }, 1000);
    }

    function generateQuestion() {
        const ops = ['+', '-', '*', '/'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let n1, n2;

        // Dificultad para niГұo de 9 aГұos (4to / 5to grado)
        if (op === '+') { 
            // Sumas un poco mГЎs grandes (hasta 3 dГӯgitos)
            n1 = Math.floor(Math.random() * 800) + 100; // 100 a 899
            n2 = Math.floor(Math.random() * 800) + 100; // 100 a 899
            currentAns = n1 + n2; 
        }
        else if (op === '-') { 
            // Restas de 3 dГӯgitos garantizando resultado positivo
            n1 = Math.floor(Math.random() * 800) + 200; // 200 a 999
            n2 = Math.floor(Math.random() * (n1 - 100)) + 50; // Siempre menor que n1
            currentAns = n1 - n2; 
        }
        else if (op === '*') { 
            if (Math.random() > 0.5) {
                // Multiplicaciones clГЎsicas hasta el 12x12
                n1 = Math.floor(Math.random() * 11) + 2;    // 2 a 12
                n2 = Math.floor(Math.random() * 11) + 2;    // 2 a 12
            } else {
                // MultiplicaciГіn de 2 dГӯgitos por 1 dГӯgito (ej. 34 x 6)
                n1 = Math.floor(Math.random() * 40) + 10;   // 10 a 49
                n2 = Math.floor(Math.random() * 8) + 2;     // 2 a 9
            }
            if (Math.random() > 0.5) [n1, n2] = [n2, n1]; // Aleatorizar orden
            currentAns = n1 * n2; 
        }
        else { 
            // Divisiones exactas un poco mГЎs difГӯciles
            currentAns = Math.floor(Math.random() * 20) + 2; // Resultado de 2 a 21
            n2 = Math.floor(Math.random() * 11) + 2;         // Divisor de 2 a 12
            n1 = currentAns * n2;                            // Dividendo
        }

        const opSymbol = op === '*' ? 'x' : (op === '/' ? 'Г·' : op);
        document.getElementById('question').innerText = `${n1} ${opSymbol} ${n2}`;
        document.getElementById('answer').value = "";
        
        // Truco para asegurar que el input reciba el foco en mГіviles y PC
        setTimeout(() => document.getElementById('answer').focus(), 50);
        
        document.getElementById('wizard-avatar').innerText = "рҹ§ҷвҖҚвҷӮпёҸ";
        updateProgressBar();
    }

    function updateProgressBar() {
        const percentage = ((count - 1) / totalQuestions) * 100;
        document.getElementById('progress-bar').style.width = percentage + '%';
    }

    function checkAnswer() {
        if(document.getElementById('answer').value === "") return;
        
        const userVal = parseInt(document.getElementById('answer').value);
        const fb = document.getElementById('feedback');
        const container = document.getElementById('game-container');
        
        if (userVal === currentAns) {
            score++;
            fb.innerHTML = "<span style='color:var(--success)'>ВЎCorrecto! вңЁрҹҢҹ</span>";
            document.getElementById('wizard-avatar').innerText = "рҹ§ҷвҖҚвҷӮпёҸвңЁ";
            playSound("ВЎExcelente!", 1.5);
            
            const rect = container.getBoundingClientRect();
            createMagicPop(rect.left + rect.width/2, rect.top + rect.height/2, "вӯҗ");
            createMagicPop(rect.left + rect.width/2 - 50, rect.top + rect.height/2 - 50, "вңЁ");
            createMagicPop(rect.left + rect.width/2 + 50, rect.top + rect.height/2 - 50, "рҹҢҹ");
            
            if(window.confetti) {
                confetti({
                    particleCount: 40,
                    spread: 50,
                    origin: { y: 0.6 },
                    colors: ['#f1c40f', '#9b59b6', '#2ecc71']
                });
            }
            
            setTimeout(nextQuestion, 1200);
        } else {
            const isHigher = userVal < currentAns;
            fb.innerHTML = `<span style='color:var(--error)'>ВЎPrueba un poco mГЎs ${isHigher ? 'alto в¬ҶпёҸ' : 'bajo в¬ҮпёҸ'}!</span>`;
            document.getElementById('wizard-avatar').innerText = "рҹ§ҷвҖҚвҷӮпёҸрҹ’Ұ";
            playSound("Ups, un poco mГЎs " + (isHigher ? "alto" : "bajo"), 0.8);
            
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 500);
            document.getElementById('answer').value = ""; 
            setTimeout(() => document.getElementById('answer').focus(), 50);
        }
    }

    function nextQuestion() {
        if (count < totalQuestions) {
            count++;
            document.getElementById('current-idx').innerText = count;
            document.getElementById('feedback').innerHTML = "";
            generateQuestion();
        } else {
            clearInterval(timerInterval);
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResults, 500);
        }
    }

    document.getElementById('answer').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') checkAnswer(); 
    });

    // --- LГіgica de Resultados y Ranking ---
    function showResults() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('score-board').style.display = 'block';
        
        document.getElementById('final-msg').innerText = `ВЎ${score} hechizos correctos! вӯҗ`;
        document.getElementById('time-result').innerText = `Tiempo: ${seconds} segundos вҸұпёҸ`;
        playSound(`ВЎTerminaste ${playerName}! Conseguiste ${score} puntos`, 1.2);
        
        if(window.confetti) {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#f1c40f', '#9b59b6', '#2ecc71', '#3498db'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#f1c40f', '#9b59b6', '#2ecc71', '#3498db'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        saveAndShowRanking(score, seconds);
    }

    function saveAndShowRanking(finalScore, finalTime) {
        const today = new Date().toLocaleDateString('es-ES'); // Fecha local
        let ranking = JSON.parse(localStorage.getItem('magiaMatematicaRanking')) || [];
        
        // Agregar jugada actual
        ranking.push({ name: playerName, score: finalScore, time: finalTime, date: today });
        
        // Ordenar por puntaje (descendente), luego por tiempo (ascendente)
        ranking.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return a.time - b.time;
        });
        
        // Guardar en localStorage
        localStorage.setItem('magiaMatematicaRanking', JSON.stringify(ranking));
        
        // Renderizar Top 5 del dГӯa actual
        const rankingList = document.getElementById('ranking-list');
        rankingList.innerHTML = '';
        
        let todayRanking = ranking.filter(r => r.date === today).slice(0, 5);
        
        todayRanking.forEach((entry, index) => {
            const li = document.createElement('li');
            let medalla = 'вӯҗ';
            if(index === 0) medalla = 'рҹҘҮ';
            if(index === 1) medalla = 'рҹҘҲ';
            if(index === 2) medalla = 'рҹҘү';
            
            // Destacar si es el jugador actual (Гәltima partida jugada)
            const isCurrentPlay = entry.name === playerName && entry.score === finalScore && entry.time === finalTime ? 'font-weight: bold; color: var(--secondary);' : '';
            
            li.innerHTML = `
                <span style="${isCurrentPlay}">${medalla} ${entry.name}</span> 
                <span style="${isCurrentPlay}">${entry.score} pts <small>(${entry.time}s)</small></span>
            `;
            rankingList.appendChild(li);
        });
    }

</script>
</body>
</html>
