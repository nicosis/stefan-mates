      <p style="font-size: 1.2rem; margin-bottom: 15px">

        estudiar hoy.
      </p>

        <button class="mode-btn mode-math" onclick="startGame('math')">
          🔢 Magia Matemática
        </button>

          🔤 Conjuros en Inglés

        <button class="mode-btn mode-geo" onclick="startGame('geo')">
          🌍 Explorador del Mundo
        </button>
      </div>
    </div>

        🏠 Volver

        <h1 id="game-title-active">Magia Matemática</h1>

        <div class="progress-bar-container">

        </div>

        <div class="stats">

          <span>⏱️ <b id="timer">0</b>s</span>
        </div>

        <div id="question">--</div>

        <div class="input-group">

          <div id="options-container" class="options-grid">
            <button

            <button

            >

            <button

            >

        <div id="feedback"></div>
      </div>
    </div>

      function playSound(text, pitch = 1.2, rate = 1.1) {
        if (!synth) return;
        synth.cancel();
        let utter = new SpeechSynthesisUtterance(text);
        utter.pitch = pitch;
        utter.rate = rate;
        utter.lang = "es-ES";
        // Leer inglés si la pregunta es de inglés y estamos leyendo opciones, pero para feedback general mejor en español
        synth.speak(utter);
      }

      function playFartSound() {
        // Usa el archivo guardado localmente en public/fart.mp3
        const audio = new Audio("public/fart.wav");
        audio.play().catch(() => {
          // Fallback en caso de que el navegador bloquee o falle la URL
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
          } catch(e) {}
        });
      }

      function shuffleArray(array) {
        let arr = array.slice();
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function generateQuestion() {
        const qEl = document.getElementById("question");
        const avatarEl = document.getElementById("wizard-avatar");

        if (gameMode === "math") {
          avatarEl.innerText = "🧙‍♂️";
          const ops = ["+", "-", "*", "/", "fraccion"];
          const op = ops[Math.floor(Math.random() * ops.length)];
          let n1, n2, questionText, correctAnswer;

          if (op === "+") {
            n1 = Math.floor(Math.random() * 50) + 1;
            n2 = Math.floor(Math.random() * 50) + 1;
            correctAnswer = n1 + n2;
            questionText = `${n1} + ${n2}`;
          } else if (op === "-") {
            n1 = Math.floor(Math.random() * 50) + 20;
            n2 = Math.floor(Math.random() * n1) + 1;
            correctAnswer = n1 - n2;
            questionText = `${n1} - ${n2}`;
          } else if (op === "*") {
            n1 = Math.floor(Math.random() * 10) + 2;
            n2 = Math.floor(Math.random() * 10) + 2;
            correctAnswer = n1 * n2;
            questionText = `${n1} x ${n2}`;
          } else if (op === "/") {
            n2 = Math.floor(Math.random() * 9) + 2; 
            correctAnswer = Math.floor(Math.random() * 10) + 2;
            n1 = correctAnswer * n2;
            questionText = `${n1} ÷ ${n2}`;
          } else if (op === "fraccion") {
            const den = Math.floor(Math.random() * 3) + 2; // 2, 3, 4
            correctAnswer = Math.floor(Math.random() * 10) + 2;
            n1 = correctAnswer * den;
            questionText = `1/${den} de ${n1}`;
          }

          let options = [correctAnswer];
          while (options.length < 4) {
            let offset = Math.floor(Math.random() * 11) - 5;
            if (offset === 0) offset = 6;
            let wrongAns = correctAnswer + offset;
            if (wrongAns >= 0 && !options.includes(wrongAns)) {
              options.push(wrongAns);
            }
          }
          
          options = shuffleArray(options);
          currentQ = {
            q: questionText,
            options: options,
            correct: options.indexOf(correctAnswer)
          };
          
          qEl.innerText = currentQ.q;
          for (let i = 0; i < 4; i++) {
            const btn = document.getElementById(`opt-${i}`);
            btn.innerText = currentQ.options[i];
            btn.style.background = "rgba(255,255,255,0.15)";

            btn.disabled = false;
          }
        }

        updateProgressBar();
      }

          container.classList.add("shake");
          setTimeout(() => container.classList.remove("shake"), 500);

          // Pasar a la siguiente después de ver la correcta (sin sumar score)
          setTimeout(nextQuestion, 2000);
        }
      }

      function handleCorrect() {
        const fb = document.getElementById("feedback");
        const container = document.getElementById("game-container");

        score++;
        fb.innerHTML =
          "<span style='color:var(--success)'>¡Correcto! ✨🌟</span>";

        if (gameMode === "math")
          document.getElementById("wizard-avatar").innerText = "🧙‍♂️✨";
        else if (gameMode === "english")
          document.getElementById("wizard-avatar").innerText = "🗽✨";
        else document.getElementById("wizard-avatar").innerText = "🗺️✨";

        playHooraySound();

        const rect = container.getBoundingClientRect();
        createMagicPop(
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
          "⭐",
        );
        createMagicPop(
          rect.left + rect.width / 2 - 50,
          rect.top + rect.height / 2 - 50,
          "✨",
        );
        createMagicPop(
          rect.left + rect.width / 2 + 50,
          rect.top + rect.height / 2 - 50,
          "🌟",
        );

        if (window.confetti) {
          confetti({
            particleCount: 40,
            spread: 50,
            origin: { y: 0.6 },
            colors: ["#f1c40f", "#9b59b6", "#2ecc71"],
          });
        }

        setTimeout(nextQuestion, 1200);
      }

      function nextQuestion() {
        if (count < totalQuestions) {
          count++;
          document.getElementById("current-idx").innerText = count;
          document.getElementById("feedback").innerHTML = "";
          generateQuestion();
        } else {
          clearInterval(timerInterval);
          document.getElementById("progress-bar").style.width = "100%";
          setTimeout(showResults, 500);
        }
      }

      // --- Lógica de Resultados y Ranking ---
      function showResults() {
        document.getElementById("game-container").style.display = "none";
        document.getElementById("score-board").style.display = "block";

        document.getElementById("final-msg").innerText =
          `¡${score} aciertos! ⭐`;
        document.getElementById("time-result").innerText =
          `Tiempo: ${seconds} segundos ⏱️`;
        playSound(
          `¡Terminaste ${playerName}! Conseguiste ${score} puntos`,
          1.2,
        );

        if (window.confetti) {
          var duration = 3000;
          var end = Date.now() + duration;

          (function frame() {
            confetti({
              particleCount: 5,
              angle: 60,
              spread: 55,
              origin: { x: 0 },
              colors: ["#f1c40f", "#9b59b6", "#2ecc71", "#3498db"],
            });
            confetti({
              particleCount: 5,
              angle: 120,
              spread: 55,
              origin: { x: 1 },
              colors: ["#f1c40f", "#9b59b6", "#2ecc71", "#3498db"],
            });
            if (Date.now() < end) requestAnimationFrame(frame);
          })();
        }

        saveAndShowRanking(score, seconds, gameMode);
        sendEmailWithStats(score, seconds, gameMode, playerName);
      }

      function sendEmailWithStats(finalScore, finalTime, mode, name) {
        if (!EMAIL_DESTINO || EMAIL_DESTINO === "") {
          console.log(
            "No se envía correo porque no se configuró el email destino.",
          );
          return;
        }

        const modeNames = {
          math: "Matemáticas",
          english: "Inglés",
          geo: "Geografía",
        };
        const modoTexto = modeNames[mode] || mode;

        const data = {
          _subject: `Nueva partida de ${name} (${modoTexto}) - Academia Mágica`,
          Alumno: name,
          Materia: modoTexto,
          Aciertos: `${finalScore}/10`,
          Tiempo: `${finalTime} segundos`,
          Fecha: new Date().toLocaleString("es-ES"),
        };

        // Enviar usando la API gratuita de FormSubmit
        fetch(`https://formsubmit.co/ajax/${EMAIL_DESTINO}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
          },
          body: JSON.stringify(data),
        })
          .then((response) => response.json())
          .then((data) => console.log("Correo enviado con éxito", data))
          .catch((error) => console.error("Error al enviar el correo", error));
      }

      function saveAndShowRanking(finalScore, finalTime, mode) {
        const today = new Date().toLocaleDateString("es-ES");
        let ranking =
          JSON.parse(localStorage.getItem("academiaMagicaRanking")) || [];

        // Agregar jugada actual
        ranking.push({
          name: playerName,
          score: finalScore,
          time: finalTime,
          date: today,
          mode: mode,
        });

        // Ordenar: 1) Score(desc), 2) Tiempo(asc)
        ranking.sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          return a.time - b.time;
        });

        localStorage.setItem("academiaMagicaRanking", JSON.stringify(ranking));

        // Renderizar Top 5 del día actual (sin importar qué materia, o podríamos filtrar)
        // Por ahora muestro el Ranking mezclado general del día
        const rankingList = document.getElementById("ranking-list");
        rankingList.innerHTML = "";

        let todayRanking = ranking.filter((r) => r.date === today).slice(0, 5);

        todayRanking.forEach((entry, index) => {
          const li = document.createElement("li");
          let medalla = "⭐";
          if (index === 0) medalla = "🥇";
          if (index === 1) medalla = "🥈";
          if (index === 2) medalla = "🥉";

          const isCurrentPlay =
            entry.name === playerName &&
            entry.score === finalScore &&
            entry.time === finalTime &&
            entry.mode === mode
              ? "font-weight: bold; color: var(--secondary);"
              : "";

          let colorModo =
            entry.mode === "math"
              ? "var(--math)"
              : entry.mode === "english"
                ? "var(--english)"
                : "var(--geo)";
          let iconoModo =
            entry.mode === "math"
              ? "🔢"
              : entry.mode === "english"
                ? "🔤"
                : "🌍";

          li.innerHTML = `
                <div style="display:flex; align-items:center; ${isCurrentPlay}">
                    <span>${medalla} ${entry.name}</span>
                    <span class="mode-badge" style="background:${colorModo};">${iconoModo}</span>
                </div>
                <span style="${isCurrentPlay}">${entry.score}/10 <small>(${entry.time}s)</small></span>
            `;
          rankingList.appendChild(li);
        });
      }
    </script>
  </body>
</html>
